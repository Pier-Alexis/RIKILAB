<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - RikiLab</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(-45deg, #000000, #0a1f0f, #0f3d1f, #000000);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    color: white;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}


.topbar {
        width: 100%;
        height: 70px;
        padding: 0 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;

        backdrop-filter: blur(10px);
        background: linear-gradient(120deg, rgba(255,255,255,0.95), rgba(240,255,240,0.85));
        border-bottom: 1px solid rgba(0,0,0,0.1);
    }

.logo {
    height: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    color: black;
    font-size: 1.2em;
    font-weight: bold;
}

.logo img {
    height: 45px;
    width: 45px;
    object-fit: contain;
}

.nav a {
    margin-left: 25px;
    text-decoration: none;
    color: black;
    font-weight: 500;
    position: relative;
    transition: color 0.3s ease;
}

.nav a::after {
    content: "";
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0%;
    height: 2px;
    background: #0f9d58;
    transition: width 0.3s ease;
}

.nav a:hover { color: #0f9d58; }
.nav a:hover::after { width: 100%; }

/* LAYOUT */
.container {
    max-width: 1100px;
    margin: 120px auto;
    display: flex;
    gap: 40px;
    padding: 20px;
}

/* FORM */
.form-box {
    flex: 2;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.1);
}

.form-box h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    color: #ccc;
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

textarea {
    resize: none;
    height: 120px;
}

/* BUTTON */
.submit-btn {
    margin-top: 10px;
    padding: 14px;
    width: 100%;
    border-radius: 25px;
    border: none;
    background: linear-gradient(120deg, #0f9d58, #0c7c46);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* INFO BOX */
.info-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.1);
}

.info-box h3 {
    margin-bottom: 15px;
}

.info-box p {
    color: #ccc;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="logo">
        <img src="../static/RIKILAB.png">
    </div>

    <div class="nav">
        <a href="../index.html">Accueil</a>
        <a href="ordinateurs.html">Ordinateurs</a>
        <a href="services.html">Services</a>
        <a href="#">Contact</a>
    </div>
</div>

<div class="container">

    <!-- FORMULAIRE -->
    <div class="form-box">
        <h2>Contactez-nous</h2>

        <form onsubmit="sendForm(event)">
            <div class="input-group">
                <label>Nom</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea required></textarea>
            </div>

            <button class="submit-btn">Envoyer</button>
        </form>
    </div>

    <!-- INFOS -->
    <div class="info-box">
        <h3>Informations</h3>
        <p>Email : contact@rikilab.ca</p>
        <p>Réponse rapide pour projets professionnels</p>
        <p>Impression • CNC • Laser • Informatique •</p>
        <p>Vente d'ordinateurs</p>
    </div>

</div>

<script>
function sendForm(e) {
    e.preventDefault();
    alert("Message envoyé (simulation). Backend à connecter.");
}
</script>

</body>
</html>
